<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prompter">
<title>Prompter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --bg: #0a0a0a;
  --border: #2a2a2a;
  --text-dim: #6b6560;
  --amber: #f0a500;
  --red: #ff453a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
 
html, body {
  height: 100%;
  background: #000;
  color: #fff;
  font-family: 'DM Mono', monospace;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  /* DO NOT set overflow:hidden on body — causes iOS cursor jump bug */
}
 
/* ══════════════════════════════════════
   EDITOR SCREEN
   Normal document flow so iOS keyboard
   behaves correctly with textarea
══════════════════════════════════════ */
#editor-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  background: var(--bg);
  padding-top: calc(var(--safe-top) + 16px);
  padding-bottom: calc(var(--safe-bottom) + 16px);
}
 
.editor-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; color: var(--amber); letter-spacing: -0.4px;
}
.start-btn {
  background: var(--amber); color: #000; border: none;
  border-radius: 8px; padding: 10px 22px;
  font-family: 'DM Mono', monospace; font-size: 13px;
  font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
}
 
.controls-bar { display: flex; flex-direction: column; flex-shrink: 0; }
 
.control-group {
  display: flex; align-items: center;
  padding: 11px 20px; gap: 12px; border-bottom: 1px solid var(--border);
}
.ctrl-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-dim); width: 42px; flex-shrink: 0;
}
.slider {
  -webkit-appearance: none; flex: 1; height: 3px;
  background: var(--border); border-radius: 2px; outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  border-radius: 50%; background: var(--amber); cursor: pointer;
  box-shadow: 0 0 0 4px rgba(240,165,0,0.15);
}
.val-display {
  font-size: 13px; font-weight: 500; color: var(--amber);
  width: 32px; text-align: right; flex-shrink: 0;
}
 
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
  flex-shrink: 0;
}
.toggle-label-wrap { display: flex; flex-direction: column; gap: 3px; }
.toggle-label-wrap .main { font-size: 13px; color: #f5f0e8; }
.toggle-label-wrap .sub { font-size: 10px; color: var(--text-dim); }
 
.pill {
  width: 44px; height: 26px; background: #222;
  border-radius: 13px; position: relative; transition: background 0.2s; flex-shrink: 0;
}
.pill.on { background: #5a3d00; }
.pill::after {
  content: ''; position: absolute; width: 18px; height: 18px;
  border-radius: 50%; background: #555; top: 4px; left: 4px;
  transition: transform 0.2s, background 0.2s;
}
.pill.on::after { transform: translateX(18px); background: var(--amber); }
 
.textarea-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0 20px 20px;
  min-height: 200px;
}
textarea {
  flex: 1;
  background: transparent; border: none; outline: none; resize: none;
  color: #f5f0e8; font-family: 'DM Serif Display', serif;
  font-size: 18px; line-height: 1.65;
  padding: 16px 0;
  width: 100%;
  min-height: 180px;
  -webkit-user-select: text;
  user-select: text;
  /* Critical: stops iOS repositioning viewport on focus */
  -webkit-appearance: none;
}
textarea::placeholder { color: var(--text-dim); }
.char-count {
  font-size: 10px; color: var(--text-dim);
  text-align: right; padding-top: 6px; flex-shrink: 0;
}
 
/* ══════════════════════════════════════
   OVERLAY SCREENS (prompter + playback)
   These sit on top of the editor
══════════════════════════════════════ */
#prompter-screen,
#playback-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: opacity 0.28s, transform 0.28s;
  z-index: 50;
}
#prompter-screen.hidden,
#playback-screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(14px);
}
 
/* ══════════════════════════════════════
   PROMPTER SCREEN
══════════════════════════════════════ */
#prompter-screen { background: #000; }
 
#live-camera {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transform: scaleX(-1); z-index: 1;
}
 
#text-band {
  position: absolute; left: 0; right: 0; top: 18%; bottom: 18%;
  background: rgba(0,0,0,0.5); z-index: 2; pointer-events: none;
}
#text-band::before, #text-band::after {
  content: ''; position: absolute; left: 0; right: 0; height: 60px; pointer-events: none;
}
#text-band::before { top: -60px; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5)); }
#text-band::after  { bottom: -60px; background: linear-gradient(to top, transparent, rgba(0,0,0,0.5)); }
 
#script-scroll {
  position: absolute; left: 0; right: 0; top: 18%; bottom: 18%;
  overflow: hidden; z-index: 4;
}
#script-text {
  padding: 40vh 28px 40vh;
  font-family: 'DM Serif Display', serif;
  line-height: 1.55; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.6);
  will-change: transform;
}
 
.read-line {
  position: absolute; left: 0; right: 0; top: 50%; height: 2px;
  background: rgba(240,165,0,0.3); z-index: 5; pointer-events: none;
}
 
.prompter-hud {
  position: absolute; top: calc(var(--safe-top) + 14px);
  left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; gap: 10px;
}
.hud-btn {
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; color: #fff; padding: 9px 14px;
  font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
}
.hud-btn.danger { color: var(--red); border-color: rgba(255,69,58,0.4); }
 
.hud-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.hud-speed { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1px; transition: color 0.4s; }
.rec-indicator {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--red); letter-spacing: 1px;
  opacity: 0; transition: opacity 0.3s;
}
.rec-indicator.on { opacity: 1; }
.rec-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: blink 1.1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
 
.speed-bumps {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 12px; z-index: 10;
}
.bump-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.22);
  color: #fff; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
 
.progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: rgba(255,255,255,0.1); z-index: 10;
}
.progress-fill { height: 100%; background: var(--amber); width: 0%; transition: width 0.1s linear; }
 
.pause-badge {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.78); border: 1px solid var(--amber);
  border-radius: 12px; padding: 12px 28px;
  font-size: 13px; color: var(--amber); letter-spacing: 2px; text-transform: uppercase;
  z-index: 15; opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.pause-badge.visible { opacity: 1; }
 
.tap-hint {
  position: absolute; bottom: calc(var(--safe-bottom) + 12px); left: 50%; transform: translateX(-50%);
  font-size: 9px; color: rgba(255,255,255,0.22); letter-spacing: 1px;
  text-transform: uppercase; z-index: 10; white-space: nowrap;
}
 
/* ══════════════════════════════════════
   PLAYBACK SCREEN
══════════════════════════════════════ */
#playback-screen { background: #000; }
 
#playback-video {
  width: 100%; height: 100%; object-fit: cover;
  position: absolute; inset: 0;
}
 
.playback-top {
  position: absolute; top: calc(var(--safe-top) + 14px);
  left: 16px; right: 16px; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
}
.playback-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; color: #fff;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
}
 
.playback-controls {
  position: absolute; bottom: calc(var(--safe-bottom) + 24px);
  left: 0; right: 0; z-index: 10;
  display: flex; justify-content: center; gap: 12px; padding: 0 20px;
}
.pb-btn {
  flex: 1; max-width: 160px;
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px; color: #fff; padding: 16px 10px;
  font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  text-transform: uppercase; letter-spacing: 0.5px; text-align: center;
  line-height: 1.3;
}
.pb-btn.amber { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 500; }
.pb-btn.danger { color: var(--red); border-color: rgba(255,69,58,0.4); }
</style>
</head>
<body>
 
<!-- ══ EDITOR — normal document flow, no position:absolute ══ -->
<div id="editor-screen">
  <div class="editor-header">
    <span class="app-title">Prompter</span>
    <button class="start-btn" onclick="startSession()">▶ Start</button>
  </div>
 
  <div class="controls-bar">
    <div class="control-group">
      <span class="ctrl-label">Speed</span>
      <input type="range" class="slider" id="speed-slider" min="1" max="100" value="20" oninput="onSpeedSlider()">
      <span class="val-display" id="speed-val">20</span>
    </div>
    <div class="control-group">
      <span class="ctrl-label">Size</span>
      <input type="range" class="slider" id="size-slider" min="16" max="64" value="32" oninput="onSizeSlider()">
      <span class="val-display" id="size-val">32</span>
    </div>
  </div>
 
  <div class="toggle-row" onclick="toggleMirror()">
    <div class="toggle-label-wrap">
      <span class="main">↔ Mirror text</span>
      <span class="sub">Flip for teleprompter glass setups</span>
    </div>
    <div class="pill" id="mirror-pill"></div>
  </div>
 
  <div class="textarea-wrap">
    <textarea id="script-input" placeholder="Paste or type your script here…" oninput="updateCount()" spellcheck="true"></textarea>
    <div class="char-count" id="char-count">0 characters</div>
  </div>
</div>
 
<!-- ══ PROMPTER — fixed overlay ══ -->
<div id="prompter-screen" class="hidden">
  <video id="live-camera" autoplay muted playsinline></video>
  <div id="text-band"></div>
  <div class="read-line"></div>
  <div id="script-scroll"><div id="script-text"></div></div>
 
  <div class="prompter-hud">
    <button class="hud-btn danger" onclick="stopSession()">✕ Stop</button>
    <div class="hud-center">
      <span class="hud-speed" id="hud-speed">SPEED 20</span>
      <div class="rec-indicator" id="rec-indicator"><div class="rec-dot"></div>REC</div>
    </div>
    <button class="hud-btn" onclick="togglePause()" id="pause-btn">⏸ Pause</button>
  </div>
 
  <div class="speed-bumps">
    <div class="bump-btn" onclick="bumpSpeed(1)">+</div>
    <div class="bump-btn" onclick="bumpSpeed(-1)">−</div>
  </div>
 
  <div style="position:absolute;inset:0;z-index:6;" onclick="handleScreenTap(event)"></div>
  <div class="pause-badge" id="pause-badge">PAUSED</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="tap-hint">TAP SCREEN TO PAUSE  •  +/− SPEED</div>
</div>
 
<!-- ══ PLAYBACK — fixed overlay ══ -->
<div id="playback-screen" class="hidden">
  <video id="playback-video" controls playsinline></video>
 
  <div class="playback-top">
    <span class="playback-title">Your Take</span>
  </div>
 
  <div class="playback-controls">
    <button class="pb-btn danger" onclick="discardTake()">🗑 Discard</button>
    <button class="pb-btn amber" id="save-btn" onclick="saveTake()">📤 Save to Photos</button>
    <button class="pb-btn" onclick="goBackToEditor()">✏ Re-edit</button>
  </div>
</div>
 
<script>
// ── State ──
let speed = 20, fontSize = 32, mirrored = false;
let scrollY = 0, totalHeight = 0;
let animFrame = null, paused = false, lastTs = null;
let wakeLock = null;
let stream = null, mediaRecorder = null;
let chunks = [], videoBlob = null;
 
// ── Editor controls ──
function onSpeedSlider() {
  speed = +document.getElementById('speed-slider').value;
  document.getElementById('speed-val').textContent = speed;
}
function onSizeSlider() {
  fontSize = +document.getElementById('size-slider').value;
  document.getElementById('size-val').textContent = fontSize;
}
function updateCount() {
  const n = document.getElementById('script-input').value.length;
  document.getElementById('char-count').textContent = n.toLocaleString() + ' character' + (n !== 1 ? 's' : '');
}
function toggleMirror() {
  mirrored = !mirrored;
  document.getElementById('mirror-pill').classList.toggle('on', mirrored);
}
 
// ── Start ──
async function startSession() {
  const ta = document.getElementById('script-input');
  const text = ta.value.trim();
  if (!text) { alert('Type your script first!'); return; }
 
  // Blur keyboard before switching screens
  ta.blur();
 
  const el = document.getElementById('script-text');
  el.style.fontSize = fontSize + 'px';
  el.style.transform = mirrored ? 'scaleX(-1)' : '';
  el.innerHTML = text.split(/\n+/)
    .map(p => `<p style="margin-bottom:${Math.round(fontSize*0.75)}px">${esc(p)}</p>`)
    .join('');
 
  scrollY = 0; paused = false; lastTs = null;
  chunks = []; videoBlob = null;
 
  const camOk = await initCamera();
  document.getElementById('rec-indicator').classList.toggle('on', camOk);
  document.getElementById('hud-speed').textContent = 'SPEED ' + speed;
 
  showScreen('prompter-screen');
  requestWakeLock();
 
  requestAnimationFrame(() => {
    const scrollEl = document.getElementById('script-scroll');
    const textEl   = document.getElementById('script-text');
    totalHeight = Math.max(0, textEl.scrollHeight - scrollEl.clientHeight);
    kick();
  });
}
 
// ── Camera ──
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: true
    });
    document.getElementById('live-camera').srcObject = stream;
    const mime = pickMime();
    mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = onRecordStop;
    mediaRecorder.start(500);
    return true;
  } catch(e) {
    document.getElementById('live-camera').style.display = 'none';
    document.getElementById('text-band').style.background = 'transparent';
    return false;
  }
}
 
function pickMime() {
  return ['video/mp4;codecs=avc1,mp4a.40.2','video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';
}
 
// ── Scroll ──
function kick() {
  if (animFrame) cancelAnimationFrame(animFrame);
  lastTs = null;
  animFrame = requestAnimationFrame(tick);
}
function tick(ts) {
  if (!paused) {
    if (!lastTs) lastTs = ts;
    const dt = ts - lastTs; lastTs = ts;
    scrollY += 0.003 * speed * dt;
    if (scrollY > totalHeight) scrollY = totalHeight;
    const el = document.getElementById('script-text');
    el.style.transform = (mirrored ? 'scaleX(-1) ' : '') + `translateY(${-scrollY}px)`;
    document.getElementById('progress-fill').style.width =
      (totalHeight > 0 ? (scrollY / totalHeight) * 100 : 0) + '%';
    if (scrollY >= totalHeight) {
      paused = true;
      document.getElementById('pause-badge').classList.add('visible');
      return;
    }
  } else { lastTs = null; }
  animFrame = requestAnimationFrame(tick);
}
 
// ── Pause / tap ──
function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶ Play' : '⏸ Pause';
  document.getElementById('pause-badge').classList.toggle('visible', paused);
  if (!paused) lastTs = null;
}
function handleScreenTap(e) {
  // Don't fire if tapping HUD or bumps
  if (e.target.closest('.prompter-hud') || e.target.closest('.speed-bumps')) return;
  togglePause();
}
 
function bumpSpeed(dir) {
  speed = Math.max(1, Math.min(100, speed + dir * 5));
  const el = document.getElementById('hud-speed');
  el.textContent = 'SPEED ' + speed;
  el.style.color = 'rgba(240,165,0,1)';
  setTimeout(() => el.style.color = 'rgba(255,255,255,0.5)', 700);
}
 
// ── Stop ──
function stopSession() {
  if (animFrame) cancelAnimationFrame(animFrame);
  paused = false; scrollY = 0;
  document.getElementById('pause-badge').classList.remove('visible');
  document.getElementById('pause-btn').textContent = '⏸ Pause';
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
 
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  } else {
    cleanupStream();
    showScreen(null);
  }
}
 
function onRecordStop() {
  cleanupStream();
  if (!chunks.length) { showScreen(null); return; }
  const mime = pickMime() || 'video/webm';
  videoBlob = new Blob(chunks, { type: mime });
  const url = URL.createObjectURL(videoBlob);
  const vid = document.getElementById('playback-video');
  vid.src = url; vid.load();
  // Reset save button
  const btn = document.getElementById('save-btn');
  btn.textContent = '📤 Save to Photos';
  btn.style.cssText = '';
  btn.className = 'pb-btn amber';
  showScreen('playback-screen');
}
 
function cleanupStream() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const cam = document.getElementById('live-camera');
  cam.srcObject = null; cam.style.display = '';
  document.getElementById('rec-indicator').classList.remove('on');
}
 
// ── Save — uses native iOS share sheet ──
async function saveTake() {
  if (!videoBlob) return;
  const btn = document.getElementById('save-btn');
 
  // Try Web Share API first — gives native iOS share sheet with "Save Video" option
  if (navigator.canShare && navigator.canShare({ files: [new File([videoBlob], 'take.mp4', { type: videoBlob.type })] })) {
    try {
      const file = new File([videoBlob], `take-${Date.now()}.mp4`, { type: videoBlob.type });
      await navigator.share({ files: [file], title: 'My Prompter Take' });
      btn.textContent = '✅ Saved!';
      btn.style.background = '#1a3a1a';
      btn.style.color = '#5dfc5d';
      btn.style.borderColor = '#5dfc5d';
      return;
    } catch(e) {
      // User cancelled share — do nothing
      if (e.name === 'AbortError') return;
    }
  }
 
  // Fallback: direct download
  const ext = videoBlob.type.includes('mp4') ? 'mp4' : 'webm';
  const url = URL.createObjectURL(videoBlob);
  const a = document.createElement('a');
  a.href = url; a.download = `take-${Date.now()}.${ext}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
  btn.textContent = '✅ Check Downloads';
  btn.style.background = '#1a3a1a';
  btn.style.color = '#5dfc5d';
  btn.style.borderColor = '#5dfc5d';
}
 
function discardTake() {
  if (!confirm('Discard this take?')) return;
  videoBlob = null; chunks = [];
  document.getElementById('playback-video').src = '';
  showScreen(null);
}
function goBackToEditor() { showScreen(null); }
 
// ── Screen management ──
function showScreen(id) {
  document.getElementById('prompter-screen').classList.toggle('hidden', id !== 'prompter-screen');
  document.getElementById('playback-screen').classList.toggle('hidden', id !== 'playback-screen');
}
 
// ── Helpers ──
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
 
// Prevent HUD buttons from triggering tap overlay
document.querySelector('.prompter-hud').addEventListener('click', e => e.stopPropagation());
document.querySelector('.speed-bumps').addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
